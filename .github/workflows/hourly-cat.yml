name: Hourly Cat Photo
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-cat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node send_cat.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Save history
        run: |
          git config user.name "cat-bot"
          git config user.email "cat-bot@users.noreply.github.com"
          git add history.json
          git commit -m "update history" || echo "nothing to commit"
          git push
